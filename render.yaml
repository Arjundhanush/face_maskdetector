# =============================================
# Render Blueprint — Face Shield AI
# =============================================
# This file defines the infrastructure for deploying
# the app on Render.com (backend + frontend).
#
# After pushing to GitHub, go to:
#   https://dashboard.render.com → New → Blueprint
#   and connect your repo.
# =============================================

services:
  # ---- Backend (FastAPI) ----
  - type: web
    name: faceshield-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      python download_models.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URI
        sync: false  # You'll set this manually in the Render dashboard
      - key: MONGO_DB
        value: faceshield
      - key: PYTHON_VERSION
        value: "3.12.0"

  # ---- Frontend (Static Site) ----
  - type: web
    name: faceshield-app
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false  # Set to the backend URL after deploying
